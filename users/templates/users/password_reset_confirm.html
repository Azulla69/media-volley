{% extends 'base.html' %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="login-card-container">
        <div class="login-card-header">
            <span class="login-emoji">🔒</span>
            <h2>Новый пароль</h2>
            <p class="section-subtitle">Придумайте новый пароль</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-field">
                <label class="form-label">Новый пароль</label>
                <input type="password" name="new_password1" class="form-control" placeholder="Новый пароль" required>
            </div>
            <div class="form-field">
                <label class="form-label">Подтверждение</label>
                <input type="password" name="new_password2" class="form-control" placeholder="Повторите пароль" required>
            </div>
            {% if form.errors %}<div class="alert alert-danger">{{ form.errors }}</div>{% endif %}
            <button type="submit" class="btn btn-warning w-100 py-3 fw-bold mt-3">💾 Сохранить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
