{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h2 class="mb-4">📝 Регистрация игрока</h2>
        <div class="card p-4" style="background: var(--card-bg);">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-warning btn-lg w-100 mt-3 fw-bold">Зарегистрироваться</button>
            </form>
            <p class="mt-3 text-center">Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
        </div>
    </div>
</div>
{% endblock %}
