{% extends 'base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-bg-pattern"></div>
    <div class="login-card-container">
        <div class="login-card-header">
            <span class="login-emoji">🔑</span>
            <h2>Забыли пароль?</h2>
            <p class="section-subtitle">Введите почту, и мы отправим ссылку для сброса</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-field">
                <label class="form-label">Электронная почта</label>
                <input type="email" name="email" class="form-control" placeholder="Введите почту" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 py-3 fw-bold mt-3">📧 Отправить</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'users:login' %}">← Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
