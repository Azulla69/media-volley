{% extends 'base.html' %}
{% block title %}Пригласить игрока{% endblock %}

{% block content %}
<div class="container py-4">
    <h2>📨 Пригласить в «{{ team.name }}»</h2>
    <div class="card p-4 mt-3" style="background:var(--card-bg); max-width:500px;">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Игрок</label>
                <select name="user_id" class="form-select searchable-select" required>
                    <option value="">Выберите игрока...</option>
                    {% for u in users %}<option value="{{ u.id }}">{{ u.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" name="is_main" id="isMain" class="form-check-input" checked>
                <label class="form-check-label" for="isMain">Пригласить в основной состав</label>
            </div>
            <button type="submit" class="btn btn-warning w-100">Отправить приглашение</button>
        </form>
        <a href="{% url 'teams:edit_team' team.id %}" class="btn btn-outline-light w-100 mt-2">← Назад</a>
    </div>
</div>

<script>
document.querySelectorAll('.searchable-select').forEach(select => {
    const wrapper = document.createElement('div'); wrapper.className = 'searchable-select-wrapper';
    select.parentNode.insertBefore(wrapper, select);
    const input = document.createElement('input'); input.type = 'text'; input.className = 'form-control form-control-sm';
    input.placeholder = select.options[0].textContent; wrapper.appendChild(input);
    const dropdown = document.createElement('div'); dropdown.className = 'searchable-dropdown'; dropdown.style.display = 'none'; wrapper.appendChild(dropdown);
    wrapper.appendChild(select); select.style.display = 'none';
    function filterOptions(search) {
        dropdown.innerHTML = '';
        Array.from(select.options).forEach(opt => {
            if (opt.value && opt.textContent.toLowerCase().includes(search.toLowerCase())) {
                const div = document.createElement('div'); div.className = 'searchable-option'; div.textContent = opt.textContent;
                div.addEventListener('click', () => { select.value = opt.value; input.value = opt.textContent; dropdown.style.display = 'none'; });
                dropdown.appendChild(div);
            }
        });
    }
    input.addEventListener('focus', () => { filterOptions(''); dropdown.style.display = 'block'; });
    input.addEventListener('input', () => filterOptions(input.value));
    document.addEventListener('click', (e) => { if (!wrapper.contains(e.target)) dropdown.style.display = 'none'; });
});
</script>
{% endblock %}
